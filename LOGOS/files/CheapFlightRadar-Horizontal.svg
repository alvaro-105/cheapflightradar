<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal logo - perfect for website headers -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="pulseGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="80%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    
    <style>
      @keyframes pulse1 {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.15); }
      }
      @keyframes pulse3 {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.2); }
      }
      
      .pulse1 { animation: pulse1 2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse2 2s ease-in-out infinite 0.5s; transform-origin: center; }
      .pulse3 { animation: pulse3 2s ease-in-out infinite 1s; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Icon with rounded background -->
  <g transform="translate(0, 0)">
    <rect x="10" y="10" width="280" height="280" rx="50" fill="url(#bgGradient)"/>
    
    <g transform="translate(150, 150)">
      <!-- Pulse rings -->
      <circle cx="0" cy="0" r="100" fill="url(#pulseGradient1)" class="pulse3" opacity="0.15"/>
      <circle cx="0" cy="0" r="70" fill="url(#pulseGradient1)" class="pulse2" opacity="0.2"/>
      <circle cx="0" cy="0" r="45" fill="url(#pulseGradient1)" class="pulse1" opacity="0.3"/>
      
      <!-- Radar screen -->
      <circle cx="0" cy="0" r="55" fill="white" opacity="0.15"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
      
      <!-- Crosshairs -->
      <line x1="-52" y1="0" x2="52" y2="0" stroke="white" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="-52" x2="0" y2="52" stroke="white" stroke-width="2" opacity="0.6"/>
      
      <!-- Blips -->
      <circle cx="20" cy="-25" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-28" cy="15" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Sweep line -->
      <line x1="0" y1="0" x2="0" y2="-47" stroke="white" stroke-width="2.5" opacity="0.8" stroke-linecap="round">
        <animateTransform
          attributeName="transform"
          attributeType="XML"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="3s"
          repeatCount="indefinite"/>
      </line>
      
      <!-- Airplane -->
      <g transform="scale(0.7)">
        <path d="M 0 -25 L 8 -10 L 20 -8 L 8 0 L 10 12 L 0 8 L -10 12 L -8 0 L -20 -8 L -8 -10 Z" 
              fill="white" 
              stroke="#10b981" 
              stroke-width="2"/>
      </g>
    </g>
  </g>
  
  <!-- Text -->
  <g transform="translate(320, 0)">
    <!-- Main text -->
    <text x="0" y="140" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="80" 
          font-weight="bold" 
          letter-spacing="2">
      <tspan fill="#10b981">Cheap</tspan><tspan fill="#22d3ee">Flight</tspan><tspan fill="#10b981">Radar</tspan>
    </text>
    
    <!-- Tagline -->
    <text x="0" y="190" 
          font-family="Arial, Helvetica, sans-serif" 
          font-size="24" 
          font-weight="600" 
          fill="#64748b"
          letter-spacing="3">
      ALWAYS SCANNING • ALWAYS SAVING
    </text>
  </g>
</svg>
