<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient square -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pulse animation circles -->
    <radialGradient id="pulseGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="80%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="pulseGradient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="60%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="pulseGradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#10b981;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    
    <!-- Animations -->
    <style>
      @keyframes pulse1 {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.15); }
      }
      @keyframes pulse3 {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.2); }
      }
      @keyframes pulse4 {
        0%, 100% { opacity: 0.1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(1.25); }
      }
      
      .pulse1 { animation: pulse1 2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse2 2s ease-in-out infinite 0.5s; transform-origin: center; }
      .pulse3 { animation: pulse3 2s ease-in-out infinite 1s; transform-origin: center; }
      .pulse4 { animation: pulse4 2s ease-in-out infinite 1.5s; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Background rounded square with gradient -->
  <rect x="0" y="0" width="800" height="800" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Radar pulse rings (animated) -->
  <g transform="translate(400, 400)">
    <!-- Outermost ring -->
    <circle cx="0" cy="0" r="280" fill="url(#pulseGradient3)" class="pulse4" opacity="0.1"/>
    
    <!-- Third ring -->
    <circle cx="0" cy="0" r="220" fill="url(#pulseGradient2)" class="pulse3" opacity="0.15"/>
    
    <!-- Second ring -->
    <circle cx="0" cy="0" r="160" fill="url(#pulseGradient1)" class="pulse2" opacity="0.2"/>
    
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="100" fill="url(#pulseGradient1)" class="pulse1" opacity="0.3"/>
    
    <!-- Center radar icon (white) -->
    <!-- Radar dish base -->
    <path d="M -60 40 L -40 40 L -40 80 L -60 80 Z" fill="white" opacity="0.8"/>
    <path d="M 40 40 L 60 40 L 60 80 L 40 80 Z" fill="white" opacity="0.8"/>
    
    <!-- Main radar screen circle -->
    <circle cx="0" cy="0" r="70" fill="white" opacity="0.15"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>
    
    <!-- Radar crosshairs -->
    <line x1="-65" y1="0" x2="65" y2="0" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-65" x2="0" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Radar blips (small dots indicating detected flights) -->
    <circle cx="25" cy="-30" r="5" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-35" cy="20" r="5" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="35" r="5" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="-40" r="5" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Sweeping radar line -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="white" stroke-width="3" opacity="0.8" stroke-linecap="round">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="3s"
        repeatCount="indefinite"/>
    </line>
    
    <!-- Airplane icon in center -->
    <g transform="scale(0.8)">
      <path d="M 0 -25 L 8 -10 L 20 -8 L 8 0 L 10 12 L 0 8 L -10 12 L -8 0 L -20 -8 L -8 -10 Z" 
            fill="white" 
            stroke="#10b981" 
            stroke-width="2"
            opacity="1"/>
    </g>
  </g>
  
  <!-- Text: CheapFlightRadar -->
  <text x="400" y="680" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="64" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle"
        letter-spacing="2">
    CheapFlightRadar
  </text>
  
  <!-- Tagline -->
  <text x="400" y="730" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="28" 
        font-weight="600" 
        fill="white" 
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.9">
    ALWAYS SCANNING • ALWAYS SAVING
  </text>
</svg>
