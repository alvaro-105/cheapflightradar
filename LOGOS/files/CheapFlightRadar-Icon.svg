<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon only - perfect for favicon, app icon, social media -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="pulseGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0" />
      <stop offset="80%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
    
    <style>
      @keyframes pulse1 {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.15); }
      }
      @keyframes pulse3 {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.2); }
      }
      
      .pulse1 { animation: pulse1 2s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse2 2s ease-in-out infinite 0.5s; transform-origin: center; }
      .pulse3 { animation: pulse3 2s ease-in-out infinite 1s; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="url(#bgGradient)"/>
  
  <!-- Radar rings centered -->
  <g transform="translate(256, 256)">
    <!-- Pulse rings -->
    <circle cx="0" cy="0" r="180" fill="url(#pulseGradient1)" class="pulse3" opacity="0.15"/>
    <circle cx="0" cy="0" r="130" fill="url(#pulseGradient1)" class="pulse2" opacity="0.2"/>
    <circle cx="0" cy="0" r="80" fill="url(#pulseGradient1)" class="pulse1" opacity="0.3"/>
    
    <!-- Radar screen -->
    <circle cx="0" cy="0" r="100" fill="white" opacity="0.15"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
    
    <!-- Crosshairs -->
    <line x1="-95" y1="0" x2="95" y2="0" stroke="white" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="-95" x2="0" y2="95" stroke="white" stroke-width="3" opacity="0.6"/>
    
    <!-- Radar blips -->
    <circle cx="35" cy="-45" r="7" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-50" cy="30" r="7" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="50" r="7" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" cy="-55" r="7" fill="#22d3ee" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Sweeping line -->
    <line x1="0" y1="0" x2="0" y2="-85" stroke="white" stroke-width="4" opacity="0.8" stroke-linecap="round">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="3s"
        repeatCount="indefinite"/>
    </line>
    
    <!-- Airplane icon -->
    <g transform="scale(1.2)">
      <path d="M 0 -30 L 10 -12 L 25 -10 L 10 0 L 12 15 L 0 10 L -12 15 L -10 0 L -25 -10 L -10 -12 Z" 
            fill="white" 
            stroke="#10b981" 
            stroke-width="2.5"
            opacity="1"/>
    </g>
  </g>
</svg>
